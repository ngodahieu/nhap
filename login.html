<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <title>Đăng nhập</title>

  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/tsparticles@2/tsparticles.bundle.min.js"></script>

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: "Poppins", sans-serif;
    }

    body {
      height: 100vh;
      background: linear-gradient(135deg, #020617, #0f172a);
      display: flex;
      justify-content: center;
      align-items: center;
      overflow: hidden;
      color: white;
    }

    #particles {
      position: absolute;
      width: 100%;
      height: 100%;
      z-index: 0;
    }

    /* floating elements */
    .element {
      position: absolute;
      color: #38bdf8;
      font-weight: bold;
      opacity: 0.3;
      animation: float 10s linear infinite;
    }

    @keyframes float {
      from { transform: translateY(100vh); }
      to { transform: translateY(-100vh); }
    }

    /* card */
    .card {
      position: relative;
      z-index: 1;
      background: rgba(15,23,42,0.85);
      padding: 40px;
      border-radius: 20px;
      text-align: center;
      width: 350px;
      backdrop-filter: blur(10px);
      box-shadow: 0 0 30px rgba(59,130,246,0.3);
      animation: fadeIn 1s ease;
    }

    h1 {
      margin-bottom: 15px;
    }

    input {
      width: 100%;
      padding: 12px;
      border-radius: 10px;
      border: none;
      margin-top: 10px;
      margin-bottom: 20px;
      background: rgba(255,255,255,0.1);
      color: white;
      outline: none;
    }

    input::placeholder {
      color: #94a3b8;
    }

    button {
      padding: 12px 25px;
      border: none;
      border-radius: 25px;
      background: linear-gradient(135deg, #3b82f6, #1e3a8a);
      color: white;
      cursor: pointer;
      transition: 0.3s;
      width: 100%;
    }

    button:hover {
      transform: scale(1.05);
      box-shadow: 0 0 15px #3b82f6;
    }

    .icons {
      font-size: 24px;
      margin-bottom: 10px;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(30px); }
      to { opacity: 1; transform: translateY(0); }
    }
  </style>
</head>

<body>

<div id="particles"></div>

<script>
const elements = ["H","O","Na","Cl","Fe","Ca","K","Mg","CO2","NH3"];

for (let i = 0; i < 20; i++) {
  const el = document.createElement("div");
  el.className = "element";
  el.innerText = elements[Math.floor(Math.random() * elements.length)];
  el.style.left = Math.random() * 100 + "vw";
  el.style.fontSize = (Math.random() * 20 + 14) + "px";
  el.style.animationDuration = (Math.random() * 10 + 5) + "s";
  document.body.appendChild(el);
}
</script>

<div class="card">

  <div class="icons">🔐 🧪 ⚛️</div>
  <h1>Đăng nhập</h1>

  <input type="text" id="name" placeholder="Nhập mã học sinh">

  <button onclick="login()">Vào làm bài</button>

</div>

<script>
const validStudents = ["01417", "01418"];

function login() {
  const id = document.getElementById("name").value.trim();

  if (id === "") {
    alert("Vui lòng nhập mã học sinh!");
    return;
  }

  if (!validStudents.includes(id)) {
    alert("Mã học sinh không đúng!");
    return;
  }

  const done = localStorage.getItem("done_" + id);

  if (done === "true") {
    alert("Bạn đã làm bài rồi!");
    return;
  }

  // 🔥 QUAN TRỌNG: reset thời gian
  localStorage.removeItem("startTime_" + id);

  // lưu ID
  localStorage.setItem("studentID", id);

  // chuyển trang
  window.location.href = "quiz.html";
}


// particles
tsParticles.load("particles", {
  particles: {
    number: { value: 60 },
    color: { value: "#38bdf8" },
    size: { value: 2 },
    move: { enable: true, speed: 1 },
    links: {
      enable: true,
      color: "#38bdf8",
      opacity: 0.2
    }
  }
});
</script>

</body>
</html>
